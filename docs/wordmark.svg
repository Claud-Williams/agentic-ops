<svg xmlns="http://www.w3.org/2000/svg" width="320" height="48" viewBox="0 0 320 48" role="img" aria-label="agentic-ops">
  <!-- Mark: an inner node (the agent) and an outer arc (the verify-loop it runs in).
       One dominant ink colour for the wordmark and node; one restrained teal accent on the arc. -->
  <g fill="none" stroke="none">
    <circle cx="24" cy="24" r="6" fill="#1d1d1b"/>
    <path d="M 24 8 A 16 16 0 1 1 8 24" stroke="#2f6f6a" stroke-width="2.5" stroke-linecap="round"/>
  </g>
  <text x="54" y="31"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
        font-size="22" font-weight="600" fill="#1d1d1b" letter-spacing="-0.5">agentic-ops</text>
</svg>
