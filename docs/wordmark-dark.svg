    <circle cx="24" cy="24" r="6" fill="#f5f5f4"/>
    <path d="M 24 8 A 16 16 0 1 1 8 24" stroke="#2f6f6a" stroke-width="2.5" stroke-linecap="round"/>
  </g>
  <text x="54" y="31"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
        font-size="22" font-weight="600" fill="#f5f5f4" letter-spacing="-0.5">agentic-ops</text>
</svg>
